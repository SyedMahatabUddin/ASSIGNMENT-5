<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>GitHub Issue Tracker | login</title>
     <link rel="shortcut icon" href="./media/github-logo.png" type="image/x-icon">
     <!-- tailwind and daisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
     <style>
          * {
               font-family: "Geist", sans-serif;
          }
     </style>

</head>

<body class="bg-[#F8FAFC] min-h-screen mx-auto items-center flex">
     <section class="mx-auto py-14 bg-white shadow-xl w-[520px] rounded-xl flex justify-center flex-col">

     <!-- logo and title  -->
        <div class=" text-center space-y-1">
             <img class="size-[100px] mx-auto" src="./media/github-logo.png" alt="Logo">
             <h1 class="text-[#1F2937] text-2xl font-semibold">GitHub Issues Tracker</h1>
             <p class="text-[#64748B] text-[16px] font-medium">Sign in to manage your issues</p>
        </div>

     <!-- form section  -->
        <div class="">
          <fieldset class="fieldset rounded-box mx-8">     
                 <label class="label text-[#1F2937] text-[16px] font-medium">Username</label>
                 <input id="name-Input" maxlength="5" type="" class="input w-full py-6 text-[16px]" placeholder="Enter Username" />
                  <p class="text-[#4A00FF] text-[14px]" >Default: admin</p>
                 <label class="label text-[#1F2937] text-[16px] font-medium">Password</label>
                 <input id="password-Input" maxlength="8" minlength="8" type="password" class=" input w-full py-6 text-[16px]" placeholder="Enter Password" />
                 <p class="text-[#4A00FF] text-[14px]" >Default: admin123</p>
                 <button id="btn-sign-in" class="btn btn-primary text-[16px] mt-2 rounded-[8px] hover:bg-blue-600 transition-all duration-200">Sign In</button>
          </fieldset>
        </div>
     <!-- footer section  -->
        <div class="divider text-[#1F2937] m-4">OR</div>
           <p class="text-center text-[#64748B]">Demo Credentials:</p>
        <div class=" text-center bg-[#F8FAFC] max-w-full py-6 mx-6 my-4">
           <p>Username: admin</p>
           <p>Password: admin123</p>
        </div>
     </section>
     <script src="./index.js"></script>
</body>

</html>
