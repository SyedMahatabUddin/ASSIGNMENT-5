<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>GitHub Issue Tracker | Home</title>
   <link rel="shortcut icon" href="./media/github-logo.png" type="image/x-icon">
   <!-- tailwind and daisyUI -->
   <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   <!-- font -->
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
   <style>
      * {
         font-family: "Geist", sans-serif;
      }
   </style>

</head>

<body class="bg-[#F8FAFC] min-h-screen pb-8">
   <header class="flex justify-between px-2 md:px-20 py-4 border-gray-300 border-b">
      <div class="flex items-center gap-1">
         <img class="size-[30px] sm:size-[36px] " src="./media/github-logo.png" alt="">
         <h1 class="text-[18px] md:text-[26px] font-semibold">GitHub Issues Tracker</h1>
      </div>
      <div class="flex flex-row items-center gap-3"><div>
         
      </div>
         <div class="flex gap-0">
            <input id="search-input" class="focus:outline-none focus:bg-gray-300 px-2 py-1 text-[12px] md:text-[16px] border-gray-300 rounded-l " type="text" value="" placeholder="Search issues..." >
            <button id="search-btn" class="bg-[#000000] hover:bg-[#d4d4d4] px-2 py-1 text-white hover:text-black text-[12px] md:text-[16px] rounded-r cursor-pointer"> Search</button>
         </div>
         <button id="" class="btn-primary bg-[#4A00FF] text-white px-3 py-[5px]  rounded-[3px] hover:bg-purple-600 transition-all duration-200 flex flex-row text-[12px] md:text-[16px] font-semibold cursor-pointer"><img src="./media/Vector.svg" alt=""> New Issue</button>
      </div>

   </header>
   <!-- troggle section -->
   <div class="my-4 lg:mx-auto mx-4  lg:max-w-[1024px] xl:max-w-[1260px] 2xl:max-w-[1400px] px-4 py-4 space-x-2 shadow-[0_0_10px_rgba(0,0,0,0.1)] bg-white rounded-xl ">
      <button onclick="troggleFunc('all')" id="all-btn" class="bg-white border-[2px] text-[#64748B] border-[#E4E4E7] rounded py-1 hover:bg-[#4A00FF] hover:border-[#4A00FF] hover:text-white px-7 cursor-pointer">All</button>
      

      <button onclick="troggleFunc('open')" id="open-btn" class="border-[2px] border-[#E4E4E7] rounded py-1 hover:bg-[#4A00FF] hover:border-[#4A00FF] hover:text-white text-[#64748B] px-7 cursor-pointer">Open</button>


      <button onclick="troggleFunc('closed')" id="closed-btn" class="bg-white border-[2px] text-[#64748B] border-[#E4E4E7] rounded py-1 hover:bg-[#4A00FF] hover:border-[#4A00FF] hover:text-white px-7 cursor-pointer">Closed</button>
   </div>






   <!-- status seciton -->
   <section  class=" mt-4 lg:mx-auto mx-4 p-4 rounded-t-xl shadow-[0_0_10px_rgba(0,0,0,0.1)] lg:max-w-[1024px] xl:max-w-[1260px] 2xl:max-w-[1400px] flex justify-between bg-white">
      <div class="flex items-center gap-2">
         <div class="bg-purple-300 rounded-full size-[40px] flex justify-center items-center">
            <img class="size-[28px]" src="./media/Aperture.png" alt="">
         </div>
         <div>
            <p id="issue-status" class="text-[20px] font-semibold text-[#1F2937]">  Issue</p>
            <p class="text-[14px] text-[#64748B]">Track and manage your project issues</p>
         </div>
      </div>
      <div class="flex gap-3"> 
         <div class="flex items-center gap-1">
            <img class="size-[12px]" src="./media/greenEllipse 2.svg" alt="">
            <p class="text-[16px] font-medium text-[#1F2937]">Open</p>
         </div>
         <div class="flex items-center gap-1">
            <img class="size-[12px]" src="./media/purpleEllipse 2.svg" alt="">
            <p class="text-[16px] font-medium text-[#1F2937]">Closed</p>
         </div>
      </div>
   </section>
   <!-- all section -->
  <main  class="">

<!-- loading spinner -->


<section>
      <div id="spinner" class="hidden text-center gap-8 lg:mx-auto mx-4 px-4 py-8 shadow-[0_0_10px_rgba(0,0,0,0.1)] lg:max-w-[1024px] xl:max-w-[1260px] 2xl:max-w-[1400px] bg-[#FBFBFB]">
            <span class="loading loading-spinner text-neutral w-15"></span>
         </div>

      <section id="all-section" class="grid rounded-b-xl sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4  gap-8 lg:mx-auto mx-4 px-4 py-8 shadow-[0_0_10px_rgba(0,0,0,0.1)] lg:max-w-[1024px] xl:max-w-[1260px] 2xl:max-w-[1400px] bg-[#FBFBFB]">
         <!-- card -->
   
   
      </section>
   </section>
  </main>


<script src="./home.js"></script>


</body>

</html>
